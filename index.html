<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelodyMix Music Player</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="music-player">

            <h1>❤️ Roshani Tunes</h1>
            <p>Songs</p>

            <img src="images/gitar.jpg" class="album-cover" id="cover">

           <h2 id="title">Kesariya</h2>
            <h4 id="artist">Arijit Singh</h4>

            <audio id="song"></audio>

            <input type="range" value="0" id="progress">

            <div class="controls">

                <button onclick="previousSong()">
                    <i class="fas fa-backward"></i>
                </button>

                <button onclick="playPause()" id="playBtn">
                    <i class="fas fa-play"></i>
                </button>

                <button onclick="nextSong()">
                    <i class="fas fa-forward"></i>
                </button>

            </div>

            <div class="volume-section">
                <label>🔊 Volume</label>
                <input type="range" id="volume"
                    min="0" max="1" step="0.1" value="1">
            </div>

        </div>

        <div class="playlist">

            <h2>Playlist</h2>

            <ul id="playlist">
                <li onclick="selectSong(0)">Kesariya</li>
                <li onclick="selectSong(1)">Raataan Lambiyan</li>
                <li onclick="selectSong(2)">Tum Hi Ho</li>
                <li onclick="selectSong(3)">Olya Sanjveli</li>
                <li onclick="selectSong(4)">Galavarkhali</li>
                <li onclick="selectSong(5)">Adhir Man Jhale</li>
            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
